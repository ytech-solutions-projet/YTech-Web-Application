services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${DB_NAME:-ytech_db}"
      POSTGRES_USER: "${DB_USER:-ytech_user}"
      POSTGRES_PASSWORD: "${DB_PASSWORD:-YTECH_LOCAL_DB_PASSWORD_2026_S3cure!}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build:
      context: .
      args:
        REACT_APP_ENV: "${REACT_APP_ENV:-production}"
        REACT_APP_API_URL: "${REACT_APP_API_URL-}"
        REACT_APP_WS_URL: "${REACT_APP_WS_URL-}"
        REACT_APP_CSRF_COOKIE_NAME: "${REACT_APP_CSRF_COOKIE_NAME:-ytech_csrf}"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "${APP_PORT:-5001}:5001"
    environment:
      NODE_ENV: "${NODE_ENV:-production}"
      HOST: "${HOST:-0.0.0.0}"
      PORT: "${PORT:-5001}"
      FRONTEND_URL: "${FRONTEND_URL:-http://localhost:5001}"
      PUBLIC_API_URL: "${PUBLIC_API_URL:-http://localhost:5001/api}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-http://localhost:5001,http://127.0.0.1:5001}"
      PASSWORD_RESET_BASE_URL: "${PASSWORD_RESET_BASE_URL:-http://localhost:5001}"
      EMAIL_VERIFICATION_BASE_URL: "${EMAIL_VERIFICATION_BASE_URL:-http://localhost:5001}"
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: "${DB_NAME:-ytech_db}"
      DB_USER: "${DB_USER:-ytech_user}"
      DB_PASSWORD: "${DB_PASSWORD:-YTECH_LOCAL_DB_PASSWORD_2026_S3cure!}"
      DB_SSL: "${DB_SSL:-false}"
      DB_SSL_REJECT_UNAUTHORIZED: "${DB_SSL_REJECT_UNAUTHORIZED:-false}"
      JWT_SECRET: "${JWT_SECRET:-YTECH_LOCAL_DOCKER_JWT_SECRET_2026_4f7dB!9xP2mQaL8r}"
      SESSION_SECRET: "${SESSION_SECRET:-YTECH_LOCAL_DOCKER_SESSION_SECRET_2026_aL9sD!3kV7pNbQ4x}"
      AUTH_COOKIE_SECURE: "${AUTH_COOKIE_SECURE:-false}"
      AUTH_COOKIE_SAME_SITE: "${AUTH_COOKIE_SAME_SITE:-lax}"
      TRUST_PROXY: "${TRUST_PROXY:-false}"
      ENABLE_RUNTIME_SERVICES: "${ENABLE_RUNTIME_SERVICES:-false}"
      ADMIN_SEED_NAME: "${ADMIN_SEED_NAME:-YTECH Admin}"
      ADMIN_SEED_EMAIL: "${ADMIN_SEED_EMAIL:-admin@ytech.local}"
      ADMIN_SEED_PASSWORD: "${ADMIN_SEED_PASSWORD:-YtechLocalAdmin!2026}"
      ADMIN_SEED_PHONE: "${ADMIN_SEED_PHONE:-+212600000000}"
      ADMIN_SEED_COMPANY: "${ADMIN_SEED_COMPANY:-YTECH}"

volumes:
  postgres_data:
