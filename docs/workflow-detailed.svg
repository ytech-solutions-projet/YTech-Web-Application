<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="flow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#45a049;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="process" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2196F3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1976D2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="decision" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF9800;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F57C00;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="24" font-weight="bold">
    🔄 Workflow Client - Devis - Paiement - Projet
  </text>
  
  <!-- Step 1: Client Request -->
  <rect x="50" y="60" width="160" height="80" rx="10" fill="url(#flow)"/>
  <text x="130" y="85" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">
    📝 1. Demande Devis
  </text>
  <text x="130" y="105" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="11">
    Client visite le site
  </text>
  <text x="130" y="120" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="11">
    Remplit formulaire
  </text>
  <text x="130" y="135" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="11">
    Estimation automatique
  </text>
  
  <!-- Arrow 1 -->
  <path d="M 210 100 L 290 100" stroke="white" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="white"/>
    </marker>
  </defs>
  
  <!-- Step 2: Admin Analysis -->
  <rect x="290" y="60" width="160" height="80" rx="10" fill="url(#process)"/>
  <text x="370" y="85" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">
    👨‍💼 2. Analyse Admin
  </text>
  <text x="370" y="105" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="11">
    Notification admin
  </text>
  <text x="370" y="120" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="11">
    Évaluation besoins
  </text>
  <text x="370" y="135" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="11">
    Fixation prix
  </text>
  
  <!-- Arrow 2 -->
  <path d="M 450 100 L 530 100" stroke="white" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Step 3: Decision -->
  <rect x="530" y="60" width="160" height="80" rx="10" fill="url(#decision)"/>
  <text x="610" y="85" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">
    ⚖️ 3. Décision
  </text>
  <text x="610" y="105" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="11">
    Acceptation ou
  </text>
  <text x="610" y="120" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="11">
    Refus avec note
  </text>
  <text x="610" y="135" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="11">
    Notification client
  </text>
  
  <!-- Arrow 3 - Accepted -->
  <path d="M 610 140 L 610 190" stroke="#4CAF50" stroke-width="3" fill="none" marker-end="url(#arrowhead-green)"/>
  <defs>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4CAF50"/>
    </marker>
  </defs>
  
  <!-- Arrow 4 - Rejected -->
  <path d="M 610 140 L 610 190 L 370 190 L 370 250" stroke="#f44336" stroke-width="2" fill="none" stroke-dasharray="5,5" marker-end="url(#arrowhead-red)"/>
  <defs>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f44336"/>
    </marker>
  </defs>
  
  <!-- Step 4: Payment (Accepted Path) -->
  <rect x="530" y="190" width="160" height="80" rx="10" fill="url(#flow)"/>
  <text x="610" y="215" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">
    💳 4. Paiement
  </text>
  <text x="610" y="235" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="11">
    Devis validé
  </text>
  <text x="610" y="250" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="11">
    Paiement sécurisé
  </text>
  <text x="610" y="265" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="11">
    Confirmation
  </text>
  
  <!-- Arrow 5 -->
  <path d="M 610 270 L 610 320" stroke="white" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Step 5: Project Start -->
  <rect x="530" y="320" width="160" height="80" rx="10" fill="url(#process)"/>
  <text x="610" y="345" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">
    🚀 5. Démarrage Projet
  </text>
  <text x="610" y="365" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="11">
    Statut "En cours"
  </text>
  <text x="610" y="380" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="11">
    Accès client
  </text>
  <text x="610" y="395" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="11">
    Suivi temps réel
  </text>
  
  <!-- Rejected State -->
  <rect x="290" y="250" width="160" height="60" rx="10" fill="#f44336" opacity="0.8"/>
  <text x="370" y="270" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">
    ❌ Devis Refusé
  </text>
  <text x="370" y="290" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="11">
    Notification envoyée
  </text>
  <text x="370" y="305" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="11">
    Archivage
  </text>
  
  <!-- Communication Flow -->
  <rect x="50" y="320" width="420" height="80" rx="10" fill="#9C27B0" opacity="0.9"/>
  <text x="260" y="345" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">
    💬 Communication Continue
  </text>
  <text x="260" y="365" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="11">
    Messagerie temps réel • Notifications email • Dashboard partagé • Historique complet
  </text>
  <text x="260" y="385" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="11">
    Support client • Suivi projet • Documents partagés • Rapports d'avancement
  </text>
  
  <!-- Features -->
  <rect x="50" y="420" width="700" height="120" rx="10" fill="#34495e" opacity="0.9"/>
  <text x="400" y="445" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="16" font-weight="bold">
    🎯 Fonctionnalités Clés du Workflow
  </text>
  
  <!-- Feature Items -->
  <text x="80" y="470" fill="white" font-family="Arial, sans-serif" font-size="12">
    ✅ Estimation automatique selon service + options + délai
  </text>
  <text x="80" y="490" fill="white" font-family="Arial, sans-serif" font-size="12">
    ✅ Validation admin avec tarification personnalisée
  </text>
  <text x="80" y="510" fill="white" font-family="Arial, sans-serif" font-size="12">
    ✅ Paiement sécurisé avec multiples méthodes
  </text>
  <text x="80" y="530" fill="white" font-family="Arial, sans-serif" font-size="12">
    ✅ Suivi temps réel avec dashboard client
  </text>
  
  <text x="420" y="470" fill="white" font-family="Arial, sans-serif" font-size="12">
    ✅ Messagerie intégrée client/admin
  </text>
  <text x="420" y="490" fill="white" font-family="Arial, sans-serif" font-size="12">
    ✅ Notifications automatiques par email
  </text>
  <text x="420" y="510" fill="white" font-family="Arial, sans-serif" font-size="12">
    ✅ Historique complet et audit trail
  </text>
  <text x="420" y="530" fill="white" font-family="Arial, sans-serif" font-size="12">
    ✅ Support 24/7 avec chatbot IA
  </text>
</svg>
