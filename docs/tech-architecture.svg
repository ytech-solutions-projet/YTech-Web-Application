  </text>
  
  <!-- AI Layer -->
  <rect x="50" y="310" width="340" height="60" rx="10" fill="url(#ai)" opacity="0.9"/>
  <text x="220" y="330" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">
    🤖 Intelligence Artificielle - Ollama
  </text>
  <text x="220" y="350" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="11">
