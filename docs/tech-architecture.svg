  </text>
  
  <!-- Security Layer -->
  <rect x="50" y="240" width="340" height="60" rx="10" fill="url(#security)" opacity="0.9"/>
  <text x="220" y="260" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">
