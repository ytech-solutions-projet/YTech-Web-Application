  </text>
  
  <!-- Connection Lines -->
  <path d="M 400 140 L 400 150" stroke="white" stroke-width="2" fill="none"/>
  <path d="M 400 230 L 400 240" stroke="white" stroke-width="2" fill="none"/>
  <path d="M 220 300 L 220 310" stroke="white" stroke-width="2" fill="none"/>
  <path d="M 580 300 L 580 310" stroke="white" stroke-width="2" fill="none"/>
  
  <!-- Stats -->
  <rect x="50" y="380" width="700" height="15" rx="5" fill="#2C3E50" opacity="0.8"/>
  <text x="400" y="392" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="11">
    📁 167 Fichiers • 📦 44,299 Lignes Code • 🧪 28/28 Tests Passés • 🛡️ 9 Couches Sécurité • 📚 10+ Guides • 🚀 Production Ready
  </text>
