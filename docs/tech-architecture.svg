  </text>
  <text x="220" y="365" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="11">
    Apprentissage Continu • Rapports d'Utilisation • Recherche Sémantique
  </text>
  
  <!-- Infrastructure Layer -->
  <rect x="410" y="310" width="340" height="60" rx="10" fill="#9B59B6" opacity="0.9"/>
  <text x="580" y="330" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">
    ☁️ Infrastructure - Cloud Ready
  </text>
  <text x="580" y="350" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="11">
