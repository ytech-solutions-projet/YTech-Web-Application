  </text>
  <text x="400" y="125" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12">
    15 Pages • 15 Composants • 15 Utils • 3 Hooks • 2 Services • 3 Styles • Performance Optimized
  </text>
  
  <!-- Backend Layer -->
  <rect x="50" y="150" width="700" height="80" rx="10" fill="url(#backend)" opacity="0.9"/>
  <text x="400" y="175" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="16" font-weight="bold">
