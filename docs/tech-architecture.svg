  <!-- Frontend Layer -->
  <rect x="50" y="60" width="700" height="80" rx="10" fill="url(#frontend)" opacity="0.9"/>
  <text x="400" y="85" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="16" font-weight="bold">
    🎨 Frontend - React 18
  </text>
  <text x="400" y="105" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12">
