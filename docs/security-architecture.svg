<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c3e50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34495e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="security" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="owasp" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f39c12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e67e22;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="24" font-weight="bold">
    🛡️ Architecture de Sécurité - Niveau Militaire
  </text>
  
  <!-- Security Layers -->
  <!-- Layer 1: Cloudflare WAF -->
  <rect x="50" y="60" width="700" height="60" rx="5" fill="url(#security)" opacity="0.9"/>
  <text x="400" y="85" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">
    🌐 Cloudflare WAF - Protection Périmétrique
  </text>
  <text x="400" y="105" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="11">
    DDoS Protection • Rate Limiting • IP Filtering • Bot Management • Geographic Rules
  </text>
  
  <!-- Layer 2: Application Security -->
  <rect x="50" y="130" width="700" height="60" rx="5" fill="url(#owasp)" opacity="0.9"/>
  <text x="400" y="155" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">
    🔐 OWASP Top 10 - Sécurité Application
  </text>
  <text x="400" y="175" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="11">
    A01: Access Control • A02: Cryptography • A03: Injection • A04: Secure Design • A05: Misconfiguration
  </text>
  
  <!-- Layer 3: Authentication & Authorization -->
  <rect x="50" y="200" width="700" height="60" rx="5" fill="#27ae60" opacity="0.9"/>
  <text x="400" y="225" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">
    🔑 MFA + RBAC - Authentification & Autorisation
  </text>
  <text x="400" y="245" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="11">
    TOTP MFA • 6 Roles (Super Admin → Guest) • Session Management • JWT Tokens • Password Policies
  </text>
  
  <!-- Layer 4: Data Protection -->
  <rect x="50" y="270" width="700" height="60" rx="5" fill="#3498db" opacity="0.9"/>
  <text x="400" y="295" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">
    🔒 Protection des Données - Chiffrement & Validation
  </text>
  <text x="400" y="315" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="11">
    AES-256 Encryption • TLS 1.3 • Input Validation • XSS/SQL Prevention • Data Sanitization
  </text>
  
  <!-- Layer 5: Monitoring & Audit -->
  <rect x="50" y="340" width="700" height="60" rx="5" fill="#9b59b6" opacity="0.9"/>
  <text x="400" y="365" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">
    📊 Monitoring & Audit - Surveillance Continue
  </text>
  <text x="400" y="385" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="11">
    Real-time Logging • Security Events • Audit Trail • Automated Alerts • Incident Response
  </text>
  
  <!-- Compliance Badges -->
  <rect x="50" y="420" width="150" height="50" rx="5" fill="#2ecc71" opacity="0.9"/>
  <text x="125" y="440" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">
    ✅ ISO 27001
  </text>
  <text x="125" y="455" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10">
    Conformité Internationale
  </text>
  
  <rect x="220" y="420" width="150" height="50" rx="5" fill="#3498db" opacity="0.9"/>
  <text x="295" y="440" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">
    ✅ ISO 27034
  </text>
  <text x="295" y="455" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10">
    Sécurité Applications
  </text>
  
  <rect x="390" y="420" width="150" height="50" rx="5" fill="#e74c3c" opacity="0.9"/>
  <text x="465" y="440" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">
    ✅ RGPD
  </text>
  <text x="465" y="455" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10">
    Protection Données
  </text>
  
  <rect x="560" y="420" width="150" height="50" rx="5" fill="#f39c12" opacity="0.9"/>
  <text x="635" y="440" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">
    ✅ OWASP ASVS
  </text>
  <text x="635" y="455" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10">
    Level 2 Verification
  </text>
</svg>
