<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#f0f0f0;stop-opacity:0.9" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)"/>
  
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="28" font-weight="bold">
    🚀 YTECH Web Application
  </text>
  <text x="400" y="65" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="16">
    Plateforme Sécurisée de Gestion de Projets
  </text>
  
  <!-- Feature Cards -->
  <!-- Security Card -->
  <rect x="50" y="100" width="160" height="120" rx="10" fill="url(#card)"/>
  <text x="130" y="130" text-anchor="middle" fill="#333" font-family="Arial, sans-serif" font-size="20" font-weight="bold">🛡️</text>
  <text x="130" y="150" text-anchor="middle" fill="#333" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Sécurité</text>
  <text x="130" y="165" text-anchor="middle" fill="#666" font-family="Arial, sans-serif" font-size="10">OWASP Top 10</text>
  <text x="130" y="180" text-anchor="middle" fill="#666" font-family="Arial, sans-serif" font-size="10">ISO 27001</text>
  <text x="130" y="195" text-anchor="middle" fill="#666" font-family="Arial, sans-serif" font-size="10">MFA + RBAC</text>
  <text x="130" y="210" text-anchor="middle" fill="#666" font-family="Arial, sans-serif" font-size="10">Military Grade</text>
  
  <!-- AI Card -->
  <rect x="230" y="100" width="160" height="120" rx="10" fill="url(#card)"/>
  <text x="310" y="130" text-anchor="middle" fill="#333" font-family="Arial, sans-serif" font-size="20" font-weight="bold">🤖</text>
  <text x="310" y="150" text-anchor="middle" fill="#333" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Intelligence IA</text>
  <text x="310" y="165" text-anchor="middle" fill="#666" font-family="Arial, sans-serif" font-size="10">Chatbot Ollama</text>
  <text x="310" y="180" text-anchor="middle" fill="#666" font-family="Arial, sans-serif" font-size="10">Contexte Métier</text>
  <text x="310" y="195" text-anchor="middle" fill="#666" font-family="Arial, sans-serif" font-size="10">24/7 Available</text>
  <text x="310" y="210" text-anchor="middle" fill="#666" font-family="Arial, sans-serif" font-size="10">Secure & Private</text>
  
  <!-- Performance Card -->
  <rect x="410" y="100" width="160" height="120" rx="10" fill="url(#card)"/>
  <text x="490" y="130" text-anchor="middle" fill="#333" font-family="Arial, sans-serif" font-size="20" font-weight="bold">⚡</text>
  <text x="490" y="150" text-anchor="middle" fill="#333" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Performance</text>
  <text x="490" y="165" text-anchor="middle" fill="#666" font-family="Arial, sans-serif" font-size="10">&lt;200ms Response</text>
  <text x="490" y="180" text-anchor="middle" fill="#666" font-family="Arial, sans-serif" font-size="10">95%+ Coverage</text>
  <text x="490" y="195" text-anchor="middle" fill="#666" font-family="Arial, sans-serif" font-size="10">28/28 Tests Pass</text>
  <text x="490" y="210" text-anchor="middle" fill="#666" font-family="Arial, sans-serif" font-size="10">Cloud Ready</text>
  
  <!-- Features Card -->
  <rect x="590" y="100" width="160" height="120" rx="10" fill="url(#card)"/>
  <text x="670" y="130" text-anchor="middle" fill="#333" font-family="Arial, sans-serif" font-size="20" font-weight="bold">🎯</text>
  <text x="670" y="150" text-anchor="middle" fill="#333" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Fonctionnalités</text>
  <text x="670" y="165" text-anchor="middle" fill="#666" font-family="Arial, sans-serif" font-size="10">Devis Automatisés</text>
  <text x="670" y="180" text-anchor="middle" fill="#666" font-family="Arial, sans-serif" font-size="10">Paiement Sécurisé</text>
  <text x="670" y="195" text-anchor="middle" fill="#666" font-family="Arial, sans-serif" font-size="10">Messagerie Temps Réel</text>
  <text x="670" y="210" text-anchor="middle" fill="#666" font-family="Arial, sans-serif" font-size="10">Dashboard Analytics</text>
  
  <!-- Tech Stack -->
  <rect x="50" y="250" width="700" height="120" rx="10" fill="url(#card)"/>
  <text x="400" y="275" text-anchor="middle" fill="#333" font-family="Arial, sans-serif" font-size="16" font-weight="bold">🔧 Stack Technique</text>
  
  <!-- Frontend -->
  <rect x="80" y="290" width="120" height="60" rx="5" fill="#61DAFB"/>
  <text x="140" y="310" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Frontend</text>
  <text x="140" y="325" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10">React 18</text>
  <text x="140" y="340" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10">Vite + Router</text>
  
  <!-- Backend -->
  <rect x="220" y="290" width="120" height="60" rx="5" fill="#3C873A"/>
  <text x="280" y="310" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Backend</text>
  <text x="280" y="325" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10">Node.js</text>
  <text x="280" y="340" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10">Express + Security</text>
  
  <!-- Database -->
  <rect x="360" y="290" width="120" height="60" rx="5" fill="#336791"/>
  <text x="420" y="310" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Database</text>
  <text x="420" y="325" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10">PostgreSQL</text>
  <text x="420" y="340" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10">Redis Cache</text>
  
  <!-- Security -->
  <rect x="500" y="290" width="120" height="60" rx="5" fill="#DC143C"/>
  <text x="560" y="310" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Security</text>
  <text x="560" y="325" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10">OWASP + ISO</text>
  <text x="560" y="340" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10">Cloudflare WAF</text>
  
  <!-- AI -->
  <rect x="640" y="290" width="120" height="60" rx="5" fill="#FF6B35"/>
  <text x="700" y="310" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">AI</text>
  <text x="700" y="325" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10">Ollama</text>
  <text x="700" y="340" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10">Chatbot Local</text>
</svg>
