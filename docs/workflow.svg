  <path d="M668 272L692 290L668 308" fill="none" stroke="#94A3B8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M974 272L998 290L974 308" fill="none" stroke="#94A3B8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
